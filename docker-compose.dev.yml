services:
  app:
    image: php:8.2-fpm-alpine
    container_name: melyo-app
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      # Database (sqlite by default)
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-database/database.sqlite}
    volumes:
      - ./:/var/www/html:cached
      - ./storage:/var/www/html/storage
    depends_on:
      - redis
    networks:
      - melyo-net
    command: >
      sh -c "
        apk add --no-cache bash git curl zip unzip libzip-dev icu-dev oniguruma-dev zlib-dev libpng-dev libjpeg-turbo-dev freetype-dev openssl-dev autoconf g++ make sqlite-dev &&
        docker-php-ext-configure gd --with-freetype --with-jpeg &&
        docker-php-ext-install -j\$(nproc) pdo pdo_sqlite bcmath gd intl opcache &&
        pecl install redis && docker-php-ext-enable redis &&
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
        cd /var/www/html &&
        composer install --no-interaction --prefer-dist --no-progress &&
        php artisan key:generate --force &&
        php-fpm -F
      "

  web:
    image: nginx:1.27-alpine
    container_name: melyo-web
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - melyo-net

  frontend:
    image: node:20-alpine
    container_name: melyo-frontend
    working_dir: /var/www/html
    command: >
      sh -c "
        npm install &&
        npm run dev -- --host 0.0.0.0 --port ${VITE_PORT:-5173}
      "
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    volumes:
      - ./:/var/www/html:cached
      - node-modules:/var/www/html/node_modules
    depends_on:
      - app
    ports:
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    networks:
      - melyo-net

  redis:
    image: redis:7.2.4
    container_name: melyo-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./.docker/redis/config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    networks:
      - melyo-net
    ports:
      - "${REDIS_PORT_FORWARD:-6388}:6379"

volumes:
  redis-data:
  node-modules:

networks:
  melyo-net:
    driver: bridge
