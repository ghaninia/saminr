services:
  php:
    container_name: samin-php
    build:
      context: ../..
      dockerfile: .docker/php/Dockerfile
      target: dev
    image: saminr-php:dev
    env_file:
      - ../../.env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ../..:/var/www/html:delegated
      - samin_vendor:/var/www/html/vendor
      - samin_node_modules:/var/www/html/node_modules
      - samin_storage:/var/www/html/storage
    depends_on:
      - mysql
      - redis
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(file_exists(\"/var/www/html/artisan\") ? 0 : 1);'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    container_name: samin-nginx
    build:
      context: ../..
      dockerfile: .docker/nginx/Dockerfile
    image: saminr-nginx:dev
    ports:
      - "8080:80"
    depends_on:
      - php
    networks:
      - app-network
    volumes:
      - ../..:/var/www/html:ro
      - samin_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  node:
    container_name: samin-node
    build:
      context: ../..
      dockerfile: .docker/node/Dockerfile
    image: saminr-node:dev
    env_file:
      - ../../.env
    working_dir: /var/www/html
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ../..:/var/www/html:delegated
      - samin_node_modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - php
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:5173 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  mysql:
    container_name: samin-mysql
    image: mysql:8.0
    restart: always
    env_file:
      - ../../.env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${DB_DATABASE:-samin}
      - MYSQL_USER=${DB_USERNAME:-laravel}
      - MYSQL_PASSWORD=${DB_PASSWORD:-password}
    ports:
      - "${MYSQL_PORT_FORWARD:-3306}:3306"
    volumes:
      - samin_mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    container_name: samin-redis
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - samin_redis_data:/data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    container_name: samin-worker
    build:
      context: ../..
      dockerfile: .docker/php/Dockerfile
      target: dev
    image: saminr-worker:dev
    command: ["supervisord", "-n", "-c", "/etc/supervisor/supervisord.conf"]
    env_file:
      - ../../.env
    depends_on:
      - php
      - redis
    networks:
      - app-network
    volumes:
      - ../..:/var/www/html:delegated
      - samin_vendor:/var/www/html/vendor
      - samin_storage:/var/www/html/storage
    restart: unless-stopped

volumes:
  samin_vendor:
  samin_node_modules:
  samin_storage:
  samin_mysql_data:
  samin_redis_data:

networks:
  app-network:
    driver: bridge
