services:
  php:
    container_name: samin-php-prod
    build:
      context: ../..
      dockerfile: .docker/php/Dockerfile
      target: prod
    image: saminr-php:prod
    env_file:
      - ../../.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    volumes:
      - samin_storage:/var/www/html/storage
      - samin_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  nginx:
    container_name: samin-nginx-prod
    build:
      context: ../..
      dockerfile: .docker/nginx/Dockerfile
    image: saminr-nginx:prod
    ports:
      - "80:80"
    depends_on:
      - php
    networks:
      - app-network
    volumes:
      - ../..:/var/www/html:ro
      - samin_storage:/var/www/html/storage

  node:
    build:
      context: ../..
      dockerfile: .docker/node/Dockerfile
    image: saminr-node:prod
    env_file:
      - ../../.env
    working_dir: /var/www/html
    command: ["sh", "-c", "npm ci --no-audit --silent && npm run build"]
    volumes:
      - ../..:/var/www/html:rw
    depends_on:
      - php
    networks:
      - app-network

  postgres:
    container_name: samin-mysql-prod
    image: mysql:8.0
    restart: always
    env_file:
      - ../../.env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${DB_DATABASE:-samin}
      - MYSQL_USER=${DB_USERNAME:-laravel}
      - MYSQL_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - samin_mysql_data:/var/lib/mysql
    networks:
      - app-network

  redis:
    container_name: samin-redis-prod
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - app-network
    volumes:
      - samin_redis_data:/data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro

  worker:
    container_name: samin-worker-prod
    build:
      context: ../..
      dockerfile: .docker/php/Dockerfile
      target: prod
    image: saminr-worker:prod
    command: ["supervisord", "-n", "-c", "/etc/supervisor/supervisord.conf"]
    env_file:
      - ../../.env
    depends_on:
      - php
      - redis
    networks:
      - app-network
    volumes:
      - samin_storage:/var/www/html/storage
    restart: always

volumes:
  samin_storage:
  samin_bootstrap_cache:
  samin_mysql_data:
  samin_redis_data:

networks:
  app-network:
    driver: bridge
