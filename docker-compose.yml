services:
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: samin-app
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      # Database (sqlite by default)
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-database/database.sqlite}
    volumes:
      - ./:/var/www/html:cached
      - ./storage:/var/www/html/storage
      - ./vendor:/var/www/html/vendor
    depends_on:
      - redis
    networks:
      - samin

  web:
    image: nginx:1.27-alpine
    container_name: samin-web
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - samin

  frontend:
    image: node:20-alpine
    container_name: samin-frontend
    working_dir: /var/www/html
    command: >
      sh -c "
        npm install &&
        npm run dev -- --host 0.0.0.0 --port ${VITE_PORT:-5173}
      "
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    volumes:
      - ./:/var/www/html:cached
      - node-modules:/var/www/html/node_modules
    depends_on:
      - app
    ports:
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    networks:
      - samin

  redis:
    image: redis:7.2.4
    container_name: samin-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./.docker/redis/config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    networks:
      - samin
    ports:
        - "${REDIS_PORT_FORWARD:-6388}:6379"

volumes:
  redis-data:
  node-modules:

networks:
  samin:
